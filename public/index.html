<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Messaging App</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #9d7ceb;
            font-family: 'Courier New', monospace;
            line-height: 1.5;
        }
        input, button, textarea {
            font-family: 'Courier New', monospace;
            color: #9d7ceb;
            background-color: #0a0a0a;
            border: 1px solid #7c5aa6;
        }
        button:hover { background-color: #1a1a2e; }
        button:active { background-color: #16213e; }
        .message { padding: 8px 12px; margin: 4px 0; border-left: 3px solid #7c5aa6; }
        .sent { text-align: right; color: #9d7ceb; }
        .received { text-align: left; color: #a8dadc; }
        .expired { opacity: 0.4; color: #555; }
        * { transition: none !important; animation: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // REPLACE THIS WITH YOUR FIREBASE CONFIG FROM FIREBASE CONSOLE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(app);
        const db = firebase.firestore(app);

        // Auto-generated usernames
        const animals = ['ghost', 'shadow', 'cipher', 'phantom', 'neon', 'void', 'wraith', 'spectre', 'nexus', 'pixel'];
        const generateUsername = () => `${animals[Math.floor(Math.random() * animals.length)]}_${Math.floor(Math.random() * 9000) + 1000}`;

        // Message utilities
        const isMessageExpired = (timestamp) => {
            if (!timestamp) return false;
            const now = new Date();
            const msgTime = new Date(timestamp);
            return (now - msgTime) > 24 * 60 * 60 * 1000;
        };

        // Components
        const Login = ({ onLogin }) => {
            const handleGoogleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await auth.signInWithPopup(provider);
                    const user = result.user;
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (!userDoc.exists) {
                        const username = generateUsername();
                        await db.collection('users').doc(user.uid).set({
                            uid: user.uid,
                            username,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            inviteCode: Math.random().toString(36).substring(2, 8).toUpperCase()
                        });
                    }
                    onLogin(user);
                } catch (error) {
                    alert('Login failed: ' + error.message);
                }
            };

            return (
                <div className="flex items-center justify-center min-h-screen bg-black">
                    <div className="text-center">
                        <h1 className="text-4xl font-bold text-purple-400 mb-6">Minimal Chat</h1>
                        <p className="text-purple-300 mb-8">1-to-1 messaging, plain text, 24h expiry</p>
                        <button
                            onClick={handleGoogleLogin}
                            className="px-6 py-3 bg-purple-600 text-white rounded hover:bg-purple-700"
                        >
                            Login with Google
                        </button>
                    </div>
                </div>
            );
        };

        const Chat = ({ user, onLogout }) => {
            const [chats, setChats] = React.useState([]);
            const [activeChat, setActiveChat] = React.useState(null);
            const [messages, setMessages] = React.useState([]);
            const [inputValue, setInputValue] = React.useState('');
            const [searchValue, setSearchValue] = React.useState('');
            const [showSearch, setShowSearch] = React.useState(false);

            React.useEffect(() => {
                const unsubscribe = db.collection('chats')
                    .where('participants', 'array-contains', user.uid)
                    .onSnapshot((snapshot) => {
                        const chatsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setChats(chatsData);
                    });
                return unsubscribe;
            }, [user]);

            React.useEffect(() => {
                if (!activeChat) return;
                const unsubscribe = db.collection('chats').doc(activeChat).collection('messages')
                    .orderBy('createdAt', 'asc')
                    .onSnapshot((snapshot) => {
                        const messagesData = snapshot.docs
                            .map(doc => ({ id: doc.id, ...doc.data() }))
                            .filter(msg => !isMessageExpired(msg.createdAt?.toDate?.()));
                        setMessages(messagesData);
                    });
                return unsubscribe;
            }, [activeChat]);

            const sendMessage = async () => {
                if (!inputValue.trim() || !activeChat) return;
                try {
                    await db.collection('chats').doc(activeChat).collection('messages').add({
                        senderId: user.uid,
                        text: inputValue,
                        status: 'sent',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setInputValue('');
                } catch (error) {
                    alert('Failed to send message: ' + error.message);
                }
            };

            const handleSearch = async () => {
                if (!searchValue.trim()) return;
                try {
                    const userSnap = await db.collection('users').where('username', '==', searchValue).get();
                    if (userSnap.empty) {
                        alert('User not found');
                        return;
                    }
                    const otherUser = userSnap.docs[0];
                    const chatId = [user.uid, otherUser.id].sort().join('_');
                    const chatDoc = await db.collection('chats').doc(chatId).get();
                    if (!chatDoc.exists) {
                        await db.collection('chats').doc(chatId).set({
                            participants: [user.uid, otherUser.id],
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                    setActiveChat(chatId);
                    setShowSearch(false);
                    setSearchValue('');
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            };

            return (
                <div className="flex h-screen bg-black text-purple-400">
                    {/* Sidebar */}
                    <div className="w-1/4 border-r border-purple-700 p-4 flex flex-col">
                        <div className="mb-4">
                            <button
                                onClick={() => setShowSearch(!showSearch)}
                                className="w-full px-4 py-2 bg-purple-700 hover:bg-purple-600 rounded mb-2"
                            >
                                New Chat
                            </button>
                            {showSearch && (
                                <div className="mb-2">
                                    <input
                                        type="text"
                                        placeholder="Username..."
                                        value={searchValue}
                                        onChange={(e) => setSearchValue(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleSearch()}
                                        className="w-full px-3 py-2 bg-black border border-purple-700 rounded mb-2"
                                    />
                                    <button
                                        onClick={handleSearch}
                                        className="w-full px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded text-sm"
                                    >
                                        Search
                                    </button>
                                </div>
                            )}
                        </div>
                        <div className="flex-1 overflow-y-auto">
                            {chats.map(chat => (
                                <div
                                    key={chat.id}
                                    onClick={() => setActiveChat(chat.id)}
                                    className={`p-3 mb-2 cursor-pointer rounded ${
                                        activeChat === chat.id ? 'bg-purple-700' : 'hover:bg-purple-900'
                                    }`}
                                >
                                    Chat {chat.id.slice(0, 8)}...
                                </div>
                            ))}
                        </div>
                        <button
                            onClick={onLogout}
                            className="w-full px-4 py-2 bg-red-700 hover:bg-red-600 rounded mt-4"
                        >
                            Logout
                        </button>
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 flex flex-col">
                        {activeChat ? (
                            <>
                                <div className="flex-1 overflow-y-auto p-4 border-b border-purple-700">
                                    {messages.map(msg => (
                                        <div key={msg.id} className={`mb-3 ${msg.senderId === user.uid ? 'text-right' : 'text-left'}`}>
                                            <div className={`inline-block max-w-xs px-3 py-2 rounded ${
                                                msg.senderId === user.uid ? 'bg-purple-700' : 'bg-purple-900'
                                            }`}>
                                                {msg.text}
                                                <div className="text-xs mt-1 opacity-70">
                                                    {msg.status}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 flex gap-2">
                                    <input
                                        type="text"
                                        value={inputValue}
                                        onChange={(e) => setInputValue(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                        placeholder="Type message..."
                                        className="flex-1 px-4 py-2 bg-black border border-purple-700 rounded"
                                    />
                                    <button
                                        onClick={sendMessage}
                                        className="px-6 py-2 bg-purple-700 hover:bg-purple-600 rounded"
                                    >
                                        Send
                                    </button>
                                </div>
                            </>
                        ) : (
                            <div className="flex items-center justify-center h-full text-purple-500">
                                Select or create a chat
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            if (loading) return <div className="flex items-center justify-center min-h-screen bg-black text-purple-400">Loading...</div>;

            return user ? (
                <Chat user={user} onLogout={() => auth.signOut()} />
            ) : (
                <Login onLogin={setUser} />
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
